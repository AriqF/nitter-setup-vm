[Server]
hostname = "localhost"       # change to your domain or VM IP for generated links
title = "nitter"
address = "0.0.0.0"
port = 8080
https = false
httpMaxConnections = 100
staticDir = "./public"

[Cache]
listMinutes = 240
rssMinutes = 10
redisHost = "YOUR_REDIS_IP"    # IP/host Redis eksternal, contoh: "10.0.0.5"
redisPort = 6379
redisPassword = ""             # isi jika Redis memakai password
redisConnections = 20
redisMaxConnections = 30

[Config]
hmacKey = "change-me-run-openssl-rand-hex-32"
base64Media = false
enableRSS = true
enableRSSUserTweets = true
enableRSSUserReplies = true
enableRSSUserMedia = true
enableRSSSearch = true
enableRSSList = true
enableDebug = false
proxy = ""
proxyAuth = ""
apiProxy = ""
disableTid = false
maxConcurrentReqs = 2
maxRetries = 1
retryDelayMs = 150

[Preferences]
theme = "Nitter"
replaceTwitter = "nitter.net"
replaceYouTube = "piped.video"
replaceReddit = "teddit.net"
proxyVideos = true
hlsPlayback = false
infiniteScroll = false
